<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Protection</title>
	<style>
		:root {
			color-scheme: dark;
		}
		* {
			box-sizing: border-box;
		}
		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			background: #000;
			color: #fff;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			padding: 24px;
		}
		.card {
			text-align: center;
			width: min(560px, 100%);
		}
		button {
			appearance: none;
			border: 2px solid #fff;
			background: #fff;
			color: #000;
			padding: 12px 20px;
			font-size: 1rem;
			font-weight: 700;
			border-radius: 10px;
			cursor: pointer;
			transition: transform 120ms ease, opacity 120ms ease;
		}
		button:hover {
			transform: translateY(-1px);
		}
		button:active {
			transform: translateY(0);
		}
		button:disabled {
			opacity: 0.85;
			cursor: default;
		}
		p {
			margin: 18px 0 0;
			line-height: 1.5;
			font-size: 1.05rem;
		}
		.hidden {
			display: none;
		}
	</style>
</head>
<body>
	<main class="card">
		<button id="protectBtn" type="button">Enable Protection.</button>
		<p id="statusText" class="hidden">Protection enabled. You have completed the puzzle.</p>
	</main>
	<script>
		const protectBtn = document.getElementById("protectBtn");
		const statusText = document.getElementById("statusText");
		protectBtn.addEventListener("click", () => {
			protectBtn.textContent = "Protection Enabled.";
			protectBtn.disabled = true;
			statusText.classList.remove("hidden");
		});
	</script>
</body>
</html>
